<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <script>
      // Single Page App routing for GitHub Pages
      // When GitHub serves a 404 for a client-side route like /overview,
      // this redirects to index.html with the original path in a query param.
      var location = window.location;
      var path = location.pathname + location.search + location.hash;
      location.replace(location.origin + '/archits-version-dcc-prototype/?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
